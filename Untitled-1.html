                                                                                                                                                                                                                                            <!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SOFTEC</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            width: 420px;
            background: white;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            border-top: 8px solid #e53935;
        }

        h1 {
            color: #0b1f3a;
            text-align: center;
            margin-bottom: 5px;
        }

        h2 {
            color: #e53935;
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
        }

        h3 {
            color: #0b1f3a;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            color: #0b1f3a;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0 18px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .links a {
            display: inline-block;
            margin: 5px 10px 20px 0;
            color: #e53935;
            text-decoration: none;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-login {
            background: #0b1f3a;
        }

        .btn-back {
            background: #e53935;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <header>
            <h1>SOFTEC</h1>
            <h2>Software para la Gestión del Servicio Técnico</h2>
        </header>

        <form>
            <h3>Iniciar Sesión</h3>

            <label>Seleccione su rol:</label>
            <select required>
                <option value="">Seleccione una opción</option>
                <option value="cliente">Cliente</option>
                <option value="tecnico">Técnico</option>
                <option value="admin">Administrador</option>
            </select>

            <label>Usuario:</label>
            <input type="text" placeholder="Ingrese su usuario" required>

            <label>Contraseña:</label>
            <input type="password" placeholder="Ingrese su contraseña" required>

            <div class="links">
                <a href="Olvide la contraseña.html">¿Olvidé la contraseña?</a>
                <a href="index.html">Volver</a>
            </div>

            <button type="submit" class="btn btn-login">Ingresar</button>
            <button type="button" class="btn btn-back" onclick="window.location.href='index.html'">Volver al
                inicio</button>
        </form>
    </div>
</body>

</html>
